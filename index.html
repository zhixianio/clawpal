<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClawPal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=LXGW+WenKai+TC:wght@300;400;700&family=LXGW+WenKai+Mono+TC&display=swap" rel="stylesheet" />
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f2eb;
        color: #4a3a27;
        font-family: "LXGW WenKai TC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        z-index: 9999;
        transition: opacity 220ms ease;
      }
      #boot-splash.dark {
        background: #2a241f;
        color: #eadfce;
      }
      #boot-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .boot-splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .boot-spinner {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        border: 2px solid rgba(148, 111, 70, 0.25);
        border-top-color: #946f46;
        animation: boot-spin 0.9s linear infinite;
      }
      #boot-splash.dark .boot-spinner {
        border-color: rgba(234, 223, 206, 0.25);
        border-top-color: #eadfce;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <script>
      // Prevent flash: apply dark mode before React renders
      (function() {
        try {
          var t = localStorage.getItem('clawpal_theme');
          var d = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (d) {
            document.documentElement.classList.add('dark');
            var splash = document.getElementById('boot-splash');
            if (splash) splash.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
    <div id="boot-splash">
      <div class="boot-splash-inner">
        <div class="boot-spinner"></div>
        <div>ClawPal loading...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
